<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل الراديو الخاص بك</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
            padding: 40px 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }
        h1 {
            color: #38bdf8;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .status {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .radio-card {
            background: #0f172a;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #334155;
        }
        .station-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #e2e8f0;
        }
        audio {
            width: 100%;
            border-radius: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>راديو البث المباشر</h1>
        <div class="status">جاهز للتشغيل</div>

        <div class="radio-card">
            <div class="station-name">📻 قناتك الإذاعية المفضلة</div>
            
            <audio controls>
                <source src="https://foxfm.xyz/4K-1/mpegts" type="video/mp2t">
                متصفحك لا يدعم مشغل الصوت هذا.
            </audio>
        </div>
    </div>

</body>
</html>
