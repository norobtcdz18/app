<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>راديو Anis FM</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e3ff2 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    color: #fff;
  }
  .container {
    width: 100%;
    max-width: 900px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 25px;
    padding: 30px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  }
  h1 {
    text-align: center;
    font-size: 2.5rem;
    margin-bottom: 10px;
    background: linear-gradient(90deg, #fff, #ffd700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    text-align: center;
    opacity: 0.8;
    margin-bottom: 25px;
    font-size: 1rem;
  }
  .player {
    background: rgba(0, 0, 0, 0.3);
    border-radius: 20px;
    padding: 25px;
    margin-bottom: 25px;
    text-align: center;
  }
  .now-playing {
    font-size: 1.3rem;
    margin-bottom: 15px;
    color: #ffd700;
    min-height: 30px;
  }
  .disc {
    width: 120px;
    height: 120px;
    margin: 0 auto 20px;
    border-radius: 50%;
    background: radial-gradient(circle, #333 20%, #000 60%);
    border: 5px solid #ffd700;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    animation: none;
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
  }
  .disc.playing { animation: spin 4s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .controls {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    color: white;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.5rem;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
  }
  .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); }
  .btn.play {
    width: 80px;
    height: 80px;
    font-size: 2rem;
    background: linear-gradient(135deg, #f093fb, #f5576c);
  }
  .volume-control {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .volume-control input[type="range"] {
    width: 200px;
    height: 6px;
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.2);
    outline: none;
    -webkit-appearance: none;
  }
  .volume-control input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #ffd700;
    cursor: pointer;
  }
  .channels {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    max-height: 400px;
    overflow-y: auto;
    padding: 5px;
  }
  .channels::-webkit-scrollbar { width: 8px; }
  .channels::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 4px; }
  .channels::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.5); border-radius: 4px; }
  .channel {
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid transparent;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    font-weight: bold;
  }
  .channel:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: translateY(-3px);
  }
  .channel.active {
    background: linear-gradient(135deg, #f093fb, #f5576c);
    border-color: #ffd700;
    box-shadow: 0 5px 20px rgba(245, 87, 108, 0.5);
  }
  .channel-icon {
    font-size: 2rem;
    margin-bottom: 5px;
  }
  .status {
    text-align: center;
    margin-top: 10px;
    font-size: 0.9rem;
    opacity: 0.7;
  }
  @media (max-width: 500px) {
    h1 { font-size: 1.8rem; }
    .channels { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
    .btn { width: 50px; height: 50px; font-size: 1.2rem; }
    .btn.play { width: 65px; height: 65px; font-size: 1.5rem; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>📻 راديو Anis FM</h1>
  <p class="subtitle">استمع إلى جميع القنوات مباشرة</p>

  <div class="player">
    <div class="disc" id="disc">🎵</div>
    <div class="now-playing" id="nowPlaying">اختر قناة للاستماع</div>
    <div class="controls">
      <button class="btn" onclick="prevChannel()" title="السابق">⏮</button>
      <button class="btn play" id="playBtn" onclick="togglePlay()" title="تشغيل/إيقاف">▶</button>
      <button class="btn" onclick="nextChannel()" title="التالي">⏭</button>
    </div>
    <div class="volume-control">
      <span>🔈</span>
      <input type="range" id="volume" min="0" max="100" value="80" oninput="changeVolume(this.value)">
      <span>🔊</span>
    </div>
  </div>

  <div class="channels" id="channelsList"></div>
  <div class="status" id="status">جاهز للتشغيل</div>
</div>

<audio id="audio" preload="none"></audio>

<script>
  const channels = [
    { name: 'قناة 1', url: 'http://anisfm.pp.ua/1' },
    { name: 'قناة 1L', url: 'http://anisfm.pp.ua/1L' },
    { name: 'قناة 2', url: 'http://anisfm.pp.ua/2' },
    { name: 'قناة 2L', url: 'http://anisfm.pp.ua/2L' },
    { name: 'قناة 3', url: 'http://anisfm.pp.ua/3' },
    { name: 'قناة 3L', url: 'http://anisfm.pp.ua/3L' },
    { name: 'قناة 4', url: 'http://anisfm.pp.ua/4' },
    { name: 'قناة 4L', url: 'http://anisfm.pp.ua/4L' },
    { name: 'قناة 5', url: 'http://anisfm.pp.ua/5' },
    { name: 'قناة 5L', url: 'http://anisfm.pp.ua/5L' },
    { name: 'Mix 1', url: 'http://anisfm.pp.ua/Mx1' },
    { name: 'Mix 2', url: 'http://anisfm.pp.ua/Mx2' },
    { name: 'Mix FR', url: 'http://anisfm.pp.ua/MxFR' }
  ];

  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');
  const disc = document.getElementById('disc');
  const nowPlaying = document.getElementById('nowPlaying');
  const status = document.getElementById('status');
  const channelsList = document.getElementById('channelsList');

  let currentIndex = -1;
  let isPlaying = false;

  // بناء قائمة القنوات
  channels.forEach((ch, i) => {
    const div = document.createElement('div');
    div.className = 'channel';
    div.innerHTML = `<div class="channel-icon">📻</div><div>${ch.name}</div>`;
    div.onclick = () => playChannel(i);
    channelsList.appendChild(div);
  });

  function playChannel(index) {
    currentIndex = index;
    audio.src = channels[index].url;
    audio.play().then(() => {
      isPlaying = true;
      updateUI();
      status.textContent = '✓ متصل - البث مباشر';
    }).catch(err => {
      status.textContent = '⚠ خطأ في الاتصال، حاول مرة أخرى';
      console.error(err);
    });
  }

  function togglePlay() {
    if (currentIndex === -1) {
      playChannel(0);
      return;
    }
    if (isPlaying) {
      audio.pause();
      isPlaying = false;
    } else {
      audio.play();
      isPlaying = true;
    }
    updateUI();
  }

  function nextChannel() {
    const next = (currentIndex + 1) % channels.length;
    playChannel(next);
  }

  function prevChannel() {
    const prev = (currentIndex - 1 + channels.length) % channels.length;
    playChannel(prev);
  }

  function changeVolume(val) {
    audio.volume = val / 100;
  }

  function updateUI() {
    playBtn.textContent = isPlaying ? '⏸' : '▶';
    disc.classList.toggle('playing', isPlaying);
    if (currentIndex >= 0) {
      nowPlaying.textContent = '🎧 ' + channels[currentIndex].name;
    }
    document.querySelectorAll('.channel').forEach((el, i) => {
      el.classList.toggle('active', i === currentIndex);
    });
  }

  audio.volume = 0.8;

  audio.addEventListener('waiting', () => status.textContent = '⏳ جاري التحميل...');
  audio.addEventListener('playing', () => { status.textContent = '✓ متصل - البث مباشر'; isPlaying = true; updateUI(); });
  audio.addEventListener('error', () => status.textContent = '⚠ تعذر تشغيل هذه القناة');
</script>
</body>
</html>
